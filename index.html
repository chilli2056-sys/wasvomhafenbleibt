<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bremen Route</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <nav>
    <a href="#">Karte</a>
    <a href="archiv.html">Archiv</a>
  </nav>
</header>

<div id="map"></div>

<div id="sidebar">
  <div id="resize-handle"></div>
  <h2>Archiv</h2>
  <div id="content"></div>
</div>

<footer>
  <div class="footer-content">
    <span>Bremen Projekt</span>
    <span>2026</span>
  </div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
const map = L.map('map', {
  doubleClickZoom: false
}).setView([53.09, 8.78], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 📍 Deine Stationen
const stations = [
  { id:1, name:"Schlachte (Löwe)", coords:[53.0759,8.8047], info:"Startpunkt an der Weser."},
  { id:2, name:"Kellogggebäude", coords:[53.0897,8.7878], info:"Überseeinsel Bereich."},
  { id:3, name:"Europahafen", coords:[53.0889,8.7706], info:"Hafenpromenade."},
  { id:4, name:"Molenturm", coords:[53.1062,8.7477], info:"Markanter Endpunkt."},
  { id:5, name:"Hafencasino", coords:[53.0997,8.7617], info:"Sozialer Treffpunkt."},
  { id:6, name:"Gästehaus", coords:[53.0980,8.7589], info:"Cuxhavener Straße."},
  { id:7, name:"Ulrichsschuppen", coords:[53.1012,8.7568], info:"Gedenkort."}
];

// 🧭 Route steuern (hier kannst du Verlauf ändern!)
const routePoints = [
  [53.0759,8.8047],
  [53.0800,8.8000],
  [53.0850,8.7920],
  [53.0897,8.7878],
  [53.0889,8.7706],
  [53.0950,8.7600],
  [53.1000,8.7520],
  [53.1062,8.7477],
  [53.0997,8.7617],
  [53.0980,8.7589],
  [53.1012,8.7568]
];

// Marker
stations.forEach(station=>{
  const marker = L.marker(station.coords).addTo(map);

  marker.on('dblclick', ()=>{
    addCard(station);
  });

  marker.bindPopup(station.name);
});

// Routing (Fahrrad)
L.Routing.control({
  waypoints: routePoints.map(p=>L.latLng(p)),
  router: L.Routing.osrmv1({
    serviceUrl: "https://routing.openstreetmap.de/routed-bike/route/v1"
  }),
  lineOptions:{ styles:[{color:'black',weight:4}]},
  addWaypoints:false,
  draggableWaypoints:false,
  createMarker:()=>null
}).addTo(map);

// Sidebar Cards
function addCard(station){
  const container = document.getElementById("content");

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <span class="close">✕</span>
    <h3>${station.name}</h3>
    <p>${station.info}</p>
  `;

  card.querySelector(".close").onclick = ()=>card.remove();

  container.prepend(card);
}

// 🔥 RESIZE (MOUSE + TOUCH)
const sidebar = document.getElementById("sidebar");
const handle = document.getElementById("resize-handle");

let resizing=false;

handle.addEventListener("mousedown", start);
handle.addEventListener("touchstart", start);

function start(){ resizing=true; }

document.addEventListener("mousemove", move);
document.addEventListener("touchmove", move);

function move(e){
  if(!resizing) return;

  let clientX = e.touches ? e.touches[0].clientX : e.clientX;

  let width = window.innerWidth - clientX;

  if(width < 250) width = 250;

  sidebar.style.width = width + "px";
  document.getElementById("map").style.width =
    `calc(100% - ${width}px)`;

  map.invalidateSize();
}

document.addEventListener("mouseup", stop);
document.addEventListener("touchend", stop);

function stop(){ resizing=false; }

</script>

</body>
</html>
