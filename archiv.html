<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archiv</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    #archiv-grid {
      top: 60px;
      bottom: 96px;
    }

    #archiv-sidebar {
      bottom: 96px;
    }

    @media (max-width: 700px) {
      #archiv-grid {
        bottom: 108px;
        padding: 14px;
      }

      #archiv-sidebar {
        bottom: 108px;
      }
    }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="index.html">Karte</a>
    <a href="#">Archiv</a>
    <a href="kaffeekranz.html">Kaffeekranz</a>
  </nav>
</header>

<div id="archiv-grid"></div>

<div id="archiv-sidebar">
  <div id="archiv-handle">
    <span>Details</span>
    <span id="archiv-toggle">▲</span>
  </div>
  <div id="archiv-sidebar-inner">
    <div id="archiv-content"></div>
  </div>
</div>

<div id="themen-bar"></div>

<footer>
  <div class="footer-content">
    <span>Bremen Projekt</span>
    <span>2026</span>
  </div>
</footer>

<script src="stations.js"></script>
<script>
const grid = document.getElementById('archiv-grid');
const themenBar = document.getElementById('themen-bar');

const filters = {
  selectedThemen: []
};

function getAlleThemen() {
  const allThemes = stations.flatMap(station => station.themen || []);
  return [...new Set(allThemes)];
}

function formatLabel(text) {
  return text
    .split('-')
    .map(w => w.charAt(0).toUpperCase() + w.slice(1))
    .join(' ');
}

function toggleThema(thema) {
  const index = filters.selectedThemen.indexOf(thema);

  if (index > -1) {
    filters.selectedThemen.splice(index, 1);
  } else {
    filters.selectedThemen.push(thema);
  }

  renderThemenBar();
  updateArchiv();
}

function filterStations(allStations) {
  if (filters.selectedThemen.length === 0) {
    return allStations;
  }

  return allStations.filter(station => {
    const stationThemen = station.themen || [];
    return filters.selectedThemen.some(thema => stationThemen.includes(thema));
  });
}

function renderThemenBar() {
  const themen = getAlleThemen();
  themenBar.innerHTML = '';

  themen.forEach(thema => {
    const chip = document.createElement('button');
    chip.className = 'themen-chip';
    chip.textContent = formatLabel(thema);

    if (filters.selectedThemen.includes(thema)) {
      chip.classList.add('active');
    }

    chip.addEventListener('click', () => toggleThema(thema));
    themenBar.appendChild(chip);
  });
}

function renderArchiv(filteredStations) {
  grid.innerHTML = '';

  if (filteredStations.length === 0) {
    grid.innerHTML = `
      <p style="padding:10px;background:transparent;display:inline-block;border:1px solid black;">
        Keine Orte für diese Auswahl gefunden.
      </p>
    `;
    return;
  }

  filteredStations.forEach(station => {
    const kachel = document.createElement('div');
    kachel.className = 'kachel';

    const fotoHtml = station.foto
      ? `<img src="${station.foto}" alt="${station.name}" />`
      : `<div class="kachel-placeholder"><span>${station.name}</span></div>`;

    kachel.innerHTML = `
      ${fotoHtml}
      <div class="kachel-label">${station.name}</div>
    `;

    kachel.addEventListener('click', () => openDetail(station));
    grid.appendChild(kachel);
  });
}

function updateArchiv() {
  const filtered = filterStations(stations);
  renderArchiv(filtered);
}

const archivSidebar = document.getElementById('archiv-sidebar');
const archivHandle  = document.getElementById('archiv-handle');
const archivToggle  = document.getElementById('archiv-toggle');
const archivContent = document.getElementById('archiv-content');

const MIN_H = 48;
const MAX_H = () => window.innerHeight - 60 - 96;

let dragging = false;
let startY = 0;
let startH = 0;

function getY(e) {
  return e.touches ? e.touches[0].clientY : e.clientY;
}

archivHandle.addEventListener('mousedown', e => {
  dragging = true;
  startY = getY(e);
  startH = archivSidebar.offsetHeight;
  document.body.style.userSelect = 'none';
});

archivHandle.addEventListener('touchstart', e => {
  dragging = true;
  startY = getY(e);
  startH = archivSidebar.offsetHeight;
}, { passive: true });

document.addEventListener('mousemove', e => {
  if (!dragging) return;

  let h = startH + (startY - getY(e));
  h = Math.max(MIN_H, Math.min(h, MAX_H()));
  archivSidebar.style.height = h + 'px';
  archivToggle.textContent = h > MIN_H ? '▼' : '▲';
});

document.addEventListener('touchmove', e => {
  if (!dragging) return;

  let h = startH + (startY - getY(e));
  h = Math.max(MIN_H, Math.min(h, MAX_H()));
  archivSidebar.style.height = h + 'px';
  archivToggle.textContent = h > MIN_H ? '▼' : '▲';
}, { passive: true });

document.addEventListener('mouseup', () => {
  dragging = false;
  document.body.style.userSelect = '';
  snap();
});

document.addEventListener('touchend', () => {
  dragging = false;
  snap();
});

function snap() {
  if (archivSidebar.offsetHeight < MIN_H + 20) {
    archivSidebar.style.height = MIN_H + 'px';
    archivToggle.textContent = '▲';
  }
}

archivToggle.addEventListener('click', e => {
  e.stopPropagation();
  const isMin = archivSidebar.offsetHeight <= MIN_H + 5;
  archivSidebar.style.height = isMin ? '40vh' : MIN_H + 'px';
  archivToggle.textContent = isMin ? '▼' : '▲';
});

function openDetail(station) {
  const themenText = station.themen ? station.themen.join(', ') : '';
  const routenText = station.routen ? station.routen.join(', ') : '';
  const zeitText = station.zeitspannen ? station.zeitspannen.join(', ') : '';

  const fotoHtml = station.foto
    ? `<img src="${station.foto}" alt="${station.name}" class="card-foto" />`
    : `<div class="card-foto-placeholder"><span>${station.name}</span></div>`;

  archivContent.innerHTML = `
    <div class="card">
      <h3>${station.name}</h3>
      ${fotoHtml}
      <p>${station.info}</p>
      <p><strong>Themen:</strong> ${themenText}</p>
      <p><strong>Routen:</strong> ${routenText}</p>
      <p><strong>Zeitspannen:</strong> ${zeitText}</p>
    </div>
  `;

  if (archivSidebar.offsetHeight <= MIN_H + 5) {
    archivSidebar.style.height = '40vh';
    archivToggle.textContent = '▼';
  }
}

renderThemenBar();
updateArchiv();
</script>
</body>
</html>
