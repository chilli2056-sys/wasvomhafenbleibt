<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archiv</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    .archive-page {
      padding: 84px 24px 64px 24px;
    }

    .archive-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .archive-tile {
      border: 1px solid black;
      padding: 16px;
      min-height: 120px;
    }

    .archive-tile h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    .archive-tile p {
      margin: 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <nav class="nav">
      <a href="index.html">Karte</a>
      <a href="archiv.html" class="active">Archiv</a>
    </nav>
  </header>

  <main class="archive-page">
    <div class="archive-grid">
      <article class="archive-tile">
        <h2>Archiv</h2>
        <p>Hier kannst du später Kacheln mit Bildern, Texten oder Quellen einfügen.</p>
      </article>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <span>Bremen Projekt</span>
      <span>2026</span>
    </div>
  </footer>
</body>
</html>
